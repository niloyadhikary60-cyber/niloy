<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niloy Photography</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="admin-overlay" onclick="logout()"></div>

<section class="hero">
    <div class="admin-menu" onclick="openLogin()">⋮</div>
    <h1>Niloy Photography</h1>
    <p>Portrait | Street | Stories</p>
</section>

<section id="portfolio">
    <h2>My Work</h2>

    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('portrait')">Portrait</button>
        <button onclick="filterImages('pet')">Pet</button>
        <button onclick="filterImages('others')">Others</button>
    </div>

    <div class="grid" id="gallery"></div>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>Photography is about capturing moments and emotions.</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <a href="mailto:niloyadhikary60@gmail.com">niloyadhikary60@gmail.com</a>
</section>

<!-- LOGIN -->
<div class="admin-panel" id="loginBox">
    <h3>Admin Login</h3>
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
    <h3>Upload Photo</h3>

    <input type="file" id="fileInput" accept="image/*">

    <select id="imgCategory">
        <option value="portrait">Portrait</option>
        <option value="pet">Pet</option>
        <option value="others">Others</option>
    </select>

    <button onclick="addImage()">Upload</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- VIEWER -->
<div id="viewer">
    <span id="close" onclick="closeImage()">✕</span>
    <span id="prev" class="nav-btn" onclick="prevImage()">❮</span>
    <img id="viewer-img">
    <span id="next" class="nav-btn" onclick="nextImage()">❯</span>
</div>

<script>

/* ADMIN */
const ADMIN_PASS = "1234";
let isAdmin = false;

/* IMAGE DATA */
let images = [
    {url:"images/PPOT/P1.jpg", category:"portrait"},
    {url:"images/KMISC/K4.jpg", category:"others"},
    {url:"images/MPET/M2.jpg", category:"pet"}
];

const gallery = document.getElementById("gallery");

/* LOAD */
function loadGallery(){
    gallery.innerHTML = "";

    images.forEach((imgData, index) => {
        let div = document.createElement("div");
        div.className = "photo";
        div.setAttribute("data-category", imgData.category);

        div.innerHTML = `
            <img src="${imgData.url}" onclick="openImage(${index})">
            <button class="delete-btn" onclick="deleteImage(${index})">✕</button>
        `;

        gallery.appendChild(div);
    });

    updateAdminUI();
}
loadGallery();

/* FILTER */
function filterImages(category) {
    const photos = document.querySelectorAll(".photo");

    photos.forEach(photo => {
        const c = photo.getAttribute("data-category");
        photo.style.display = (category === "all" || c === category) ? "block" : "none";
    });
}

/* LOGIN */
function openLogin(){
    document.querySelector(".admin-overlay").style.display = "block";
    document.getElementById("loginBox").style.display = "block";
}

function login(){
    if(document.getElementById("password").value === ADMIN_PASS){
        isAdmin = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        updateAdminUI();
    } else alert("Wrong password");
}

function logout(){
    isAdmin = false;
    document.querySelector(".admin-overlay").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    updateAdminUI();
}

/* UPLOAD */
function addImage(){
    alert("Upload not supported on GitHub Pages");
}

/* DELETE */
function deleteImage(index){
    images.splice(index,1);
    loadGallery();
}

function updateAdminUI(){
    document.querySelectorAll(".delete-btn").forEach(btn=>{
        btn.style.display = isAdmin ? "block" : "none";
    });
}

/* VIEWER */
let current = 0;
let scale = 1, tx = 0, ty = 0;
let isDragging = false, startX = 0, startY = 0;

const img = document.getElementById("viewer-img");
const viewer = document.getElementById("viewer");

function openImage(i){
    current = i;
    img.src = images[i].url;
    viewer.classList.add("active");

    scale = 1;
    tx = 0;
    ty = 0;
    applyTransform();
}

function closeImage(){
    viewer.classList.remove("active");
}

function nextImage(){
    current = (current + 1) % images.length;
    openImage(current);
}

function prevImage(){
    current = (current - 1 + images.length) % images.length;
    openImage(current);
}

function applyTransform(){
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

img.addEventListener("wheel", (e) => {
    e.preventDefault();
    scale += (e.deltaY < 0) ? 0.1 : -0.1;
    scale = Math.max(1, Math.min(scale, 5));
    if(scale === 1){ tx = 0; ty = 0; }
    applyTransform();
});

img.addEventListener("mousedown", (e) => {
    if(scale <= 1) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mousemove", (e) => {
    if(!isDragging) return;
    tx += e.clientX - startX;
    ty += e.clientY - startY;
    startX = e.clientX;
    startY = e.clientY;
    applyTransform();
});

document.addEventListener("mouseup", () => isDragging = false);

viewer.addEventListener("click", (e) => {
    if(e.target === viewer) closeImage();
});

document.addEventListener("keydown", (e) => {
    if (!viewer.classList.contains("active")) return;
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
    if (e.key === "Escape") closeImage();
});

</script>

</body>
</html>
