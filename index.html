<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niloy Photography</title>
<link rel="stylesheet" href="style.css">

<style>
#viewer {
    opacity: 0;
    transition: opacity 0.3s ease;
}
#viewer.active {
    display: flex !important;
    opacity: 1;
}
#viewer img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    cursor: grab;
}
.photo { position: relative; }
</style>
</head>

<body>

<section class="hero">
    <h1>Niloy Photography</h1>
    <p>Portrait | Street | Stories</p>
</section>

<section id="portfolio">
    <h2>My Work</h2>

    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('portrait')">Portrait</button>
        <button onclick="filterImages('pet')">Pet</button>
        <button onclick="filterImages('others')">Others</button>
    </div>

    <div class="grid" id="gallery"></div>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>I capture emotions, stories, and moments through my lens.</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <a href="mailto:niloyadhikary60@gmail.com">niloyadhikary60@gmail.com</a>
</section>

<!-- VIEWER -->
<div id="viewer">
    <span id="close" onclick="closeImage()">✕</span>
    <span id="prev" class="nav-btn" onclick="prevImage()">❮</span>
    <img id="viewer-img">
    <span id="next" class="nav-btn" onclick="nextImage()">❯</span>
</div>

<script>

/* IMAGE DATA */
let images = [
    {url:"images/PPOT/P1.jpg", category:"portrait"},
    {url:"images/PPOT/P2.jpg", category:"portrait"},
    {url:"images/PPOT/P3.jpg", category:"portrait"},

    {url:"images/KMISC/K1.jpg", category:"others"},
    {url:"images/KMISC/K2.jpg", category:"others"},

    {url:"images/MPET/M1.jpg", category:"pet"},
    {url:"images/MPET/M2.jpg", category:"pet"}
];

const gallery = document.getElementById("gallery");

/* LOAD */
function loadGallery(){
    gallery.innerHTML = "";

    images.forEach((imgData, index) => {
        let div = document.createElement("div");
        div.className = "photo";
        div.setAttribute("data-category", imgData.category);

        div.innerHTML = `
            <img src="${imgData.url}" onclick="openImage(${index})">
        `;

        gallery.appendChild(div);
    });
}
loadGallery();

/* FILTER */
function filterImages(category) {
    const photos = document.querySelectorAll(".photo");

    photos.forEach(photo => {
        const c = photo.getAttribute("data-category");
        photo.style.display = (category === "all" || c === category) ? "block" : "none";
    });
}

/* VIEWER SYSTEM */
let current = 0;
let scale = 1;
let tx = 0, ty = 0;

let isDragging = false;
let startX = 0;
let startY = 0;

const img = document.getElementById("viewer-img");
const viewer = document.getElementById("viewer");

function openImage(i){
    current = i;
    img.src = images[i].url;
    viewer.classList.add("active");

    scale = 1;
    tx = 0;
    ty = 0;
    applyTransform();
}

function closeImage(){
    viewer.classList.remove("active");
}

function nextImage(){
    current = (current + 1) % images.length;
    openImage(current);
}
function prevImage(){
    current = (current - 1 + images.length) % images.length;
    openImage(current);
}

function applyTransform(){
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

/* ZOOM */
img.addEventListener("wheel", (e) => {
    e.preventDefault();

    if (e.deltaY < 0) scale += 0.1;
    else scale -= 0.1;

    scale = Math.max(1, Math.min(scale, 5));

    if (scale === 1) {
        tx = 0;
        ty = 0;
    }

    applyTransform();
});

/* DRAG */
img.addEventListener("mousedown", (e) => {
    if (scale <= 1) return;

    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    startX = e.clientX;
    startY = e.clientY;

    tx += dx;
    ty += dy;

    applyTransform();
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

/* CLOSE ON BACKGROUND */
viewer.addEventListener("click", (e) => {
    if (e.target === viewer) closeImage();
});

/* KEYBOARD */
document.addEventListener("keydown", (e) => {
    if (!viewer.classList.contains("active")) return;

    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
    if (e.key === "Escape") closeImage();
});

</script>

</body>
</html>
